<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Công Việc - JS</title>
    <!-- Bootstrap 5 CSS -->
    <link href="../../bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <!-- Dashboard Header -->
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-white fw-light m-0 d-flex align-items-center gap-2">
                <i class="bi bi-list-task text-white opacity-50"></i>
                <b class="text-white fw-semibold">Quản Lý Công Việc</b>
            </h2>
            <button class="btn btn-primary rounded-circle shadow-sm btn-add-task" data-bs-toggle="modal" data-bs-target="#taskModal" id="btnOpenAddModal">
                <i class="bi bi-plus-lg"></i>
            </button>
        </header>

        <!-- Filters -->
        <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-4">
            <!-- Status Filter -->
            <div class="btn-group bg-white rounded shadow-sm" role="group" id="statusFilterGroup">
                <button type="button" class="btn btn-primary filter-btn px-4" data-filter="status" data-value="all">
                    Tất cả <span id="count-all">(0)</span>
                </button>
                <button type="button" class="btn btn-outline-success filter-btn px-3" data-filter="status" data-value="completed">
                    Hoàn thành <span id="count-completed">(0)</span>
                </button>
                <button type="button" class="btn btn-outline-info filter-btn px-3" data-filter="status" data-value="pending">
                    Chưa hoàn thành <span id="count-pending">(0)</span>
                </button>
            </div>

            <!-- Priority Filter -->
            <div class="btn-group bg-white rounded shadow-sm" role="group" id="priorityFilterGroup">
                <button type="button" class="btn btn-primary filter-btn px-3" data-filter="priority" data-value="all">
                    Tất cả ưu tiên
                </button>
                <button type="button" class="btn btn-outline-success filter-btn px-3" data-filter="priority" data-value="low">
                    Ưu tiên thấp
                </button>
                <button type="button" class="btn btn-outline-warning filter-btn px-3" data-filter="priority" data-value="medium">
                    Ưu tiên trung bình
                </button>
                <button type="button" class="btn btn-outline-danger filter-btn px-3" data-filter="priority" data-value="high">
                    Ưu tiên cao
                </button>
            </div>
        </div>

        <!-- Task List Container -->
        <div class="row g-4" id="taskListContainer">
            <!-- Tasks will be injected here by JS -->
        </div>

    </div>

    <!-- Modal Form Thêm/Sửa Công Việc -->
    <div class="modal fade" id="taskModal" tabindex="-1" aria-labelledby="taskModalLabel" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-primary text-white border-0">
                    <h5 class="modal-title" id="taskModalLabel">
                        <i class="bi bi-list-task me-2"></i>Thêm công việc mới
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" id="btnCloseModalTop"></button>
                </div>
                <div class="modal-body p-4 bg-light bg-opacity-50">
                    <form id="taskForm">
                        <input type="hidden" id="taskId">
                        
                        <!-- Tiêu đề -->
                        <div class="mb-3">
                            <label for="taskTitle" class="form-label fw-bold text-dark-emphasis">
                                <i class="bi bi-type-h1 me-1"></i> Tiêu đề *
                            </label>
                            <input type="text" class="form-control" id="taskTitle" placeholder="Nhập tiêu đề công việc">
                            <div class="invalid-feedback text-danger" id="titleError"></div>
                        </div>

                        <!-- Mô tả -->
                        <div class="mb-3">
                            <label for="taskDesc" class="form-label fw-bold text-dark-emphasis">
                                <i class="bi bi-justify-left me-1"></i> Mô tả
                            </label>
                            <textarea class="form-control" id="taskDesc" rows="3" placeholder="Mô tả chi tiết công việc (tối đa 200 ký tự)"></textarea>
                            <div class="d-flex justify-content-between mt-1">
                                <small class="text-danger" id="descError"></small>
                                <small class="text-secondary" id="descCount">0/200 ký tự</small>
                            </div>
                        </div>

                        <div class="row g-3">
                            <!-- Độ ưu tiên -->
                            <div class="col-md-6">
                                <label for="taskPriority" class="form-label fw-bold text-dark-emphasis">
                                    <i class="bi bi-exclamation-triangle-fill me-1"></i> Độ ưu tiên *
                                </label>
                                <select class="form-select" id="taskPriority">
                                    <option value="" disabled selected>Chọn mức độ</option>
                                    <option value="low">Thấp</option>
                                    <option value="medium">Trung bình</option>
                                    <option value="high">Cao</option>
                                </select>
                                <div class="invalid-feedback text-danger" id="priorityError"></div>
                            </div>

                            <!-- Hạn hoàn thành -->
                            <div class="col-md-6">
                                <label for="taskDueDate" class="form-label fw-bold text-dark-emphasis">
                                    <i class="bi bi-calendar3 me-1"></i> Hạn hoàn thành *
                                </label>
                                <input type="date" class="form-control" id="taskDueDate">
                                <div class="invalid-feedback text-danger" id="dueDateError"></div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top-0 pt-0 bg-light bg-opacity-50">
                    <button type="button" class="btn btn-secondary px-4 text-white" style="background-color: #8a969f; border:none;" data-bs-dismiss="modal" id="btnCloseModal">
                        <i class="bi bi-x"></i> Hủy
                    </button>
                    <button type="button" class="btn btn-primary px-4" id="btnSaveTask">
                        <i class="bi bi-save me-1"></i> <span id="btnSaveText">Thêm</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="../../bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="data.js"></script>
    <!-- Custom script -->
    <script src="script.js"></script>
</body>
</html>
