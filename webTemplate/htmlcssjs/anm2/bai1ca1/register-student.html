<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký Sinh viên</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="container navbar-content">
            <h1 class="logo">Student Management</h1>
        </div>
    </header>
    <main class="container">
        <div class="card form-card">
            <h2>Đăng ký/Sửa thông tin Sinh viên</h2>
            <form id="student-form">
                <input type="hidden" id="edit-mode" value="">
                <div class="form-row">
                    <div class="form-group">
                        <label>Họ và tên</label>
                        <input type="text" id="fullname">
                        <span class="error" id="fullname-error"></span>
                    </div>
                    <div class="form-group">
                        <label>Mã sinh viên</label>
                        <input type="text" id="studentid" placeholder="VD: SV001">
                        <span class="error" id="studentid-error"></span>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email">
                        <span class="error" id="email-error"></span>
                    </div>
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="text" id="phone">
                        <span class="error" id="phone-error"></span>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Ngành học</label>
                        <select id="major">
                            <option value="">Chọn ngành</option>
                            <option value="IT">IT</option>
                            <option value="Business">Business</option>
                            <option value="Design">Design</option>
                        </select>
                        <span class="error" id="major-error"></span>
                    </div>
                    <div class="form-group">
                        <label>Giới tính</label>
                        <div class="radio-group">
                            <label><input type="radio" name="gender" value="Nam"> Nam</label>
                            <label><input type="radio" name="gender" value="Nữ"> Nữ</label>
                        </div>
                        <span class="error" id="gender-error"></span>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Lưu thông tin</button>
                    <a href="students.html" class="btn btn-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="register.js"></script>
</body>
</html>
