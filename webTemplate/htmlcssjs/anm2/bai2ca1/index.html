<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sản Phẩm</title>
    <!-- Ưu tiên dùng Bootstrap cục bộ, fallback sang CDN nếu không tìm thấy -->
    <link href="../../bootstrap/css/bootstrap.min.css" rel="stylesheet" onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css';">
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4" style="max-width: 900px;">
    <h2 class="text-center mb-4 fw-bold" style="color: #2c3e50;">Quản Lý Sản Phẩm</h2>

    <div class="card shadow-sm mb-4 border-0">
        <div class="card-header text-white py-2" style="background-color: #198754;">
            <h5 class="mb-0 fs-6">Thêm Sản Phẩm Mới</h5>
        </div>
        <div class="card-body">
            <form id="productForm">
                <div class="mb-3">
                    <label for="productName" class="form-label text-secondary fst-normal small mb-1">Tên Sản Phẩm</label>
                    <input type="text" class="form-control" id="productName" placeholder="Nhập tên sản phẩm">
                    <div class="invalid-feedback">Tên sản phẩm không được để trống và tối đa 30 kí tự.</div>
                </div>
                <div class="mb-3">
                    <label for="productDesc" class="form-label text-secondary small mb-1">Mô Tả</label>
                    <textarea class="form-control" id="productDesc" rows="2" placeholder="Nhập mô tả sản phẩm"></textarea>
                    <div class="invalid-feedback">Mô tả sản phẩm không được để trống.</div>
                </div>
                <div class="mb-3">
                    <label for="productPrice" class="form-label text-secondary small mb-1">Giá</label>
                    <input type="number" class="form-control" id="productPrice" placeholder="Nhập giá sản phẩm">
                    <div class="invalid-feedback">Giá sản phẩm không được để trống và phải là số không âm.</div>
                </div>
                <div class="mb-3">
                    <label for="productStatus" class="form-label text-secondary small mb-1">Trạng Thái</label>
                    <select class="form-select" id="productStatus">
                        <option value="con_hang">Còn hàng</option>
                        <option value="het_hang">Hết hàng</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 custom-btn-success shadow-sm">Thêm Sản Phẩm</button>
            </form>
        </div>
    </div>

    <!-- Sắp xếp -->
    <div class="d-flex justify-content-end mb-3">
        <div class="d-flex align-items-center bg-white border border-light shadow-sm rounded px-3 py-2">
            <label for="sortSelect" class="me-2 text-secondary fw-bold mb-0 small" style="white-space: nowrap;">Sắp xếp:</label>
            <select class="form-select border-0 shadow-none text-secondary py-0" id="sortSelect" style="width: auto; cursor: pointer; outline: none; background-color: transparent;">
                <option value="default">Mặc định</option>
                <option value="price_asc">Giá (Thấp đến Cao)</option>
                <option value="price_desc">Giá (Cao đến Thấp)</option>
                <option value="status_con">Còn hàng trước</option>
                <option value="status_het">Hết hàng trước</option>
            </select>
        </div>
    </div>

    <div class="card border-0 shadow-sm list-card mb-5">
        <div class="card-header bg-dark text-white py-2">
            <h5 class="mb-0 fs-6">Danh Sách Sản Phẩm</h5>
        </div>
        <div class="card-body p-0">
            <ul class="list-group list-group-flush" id="productList">
                <!-- Sản phẩm sẽ được render thông qua JavaScript -->
            </ul>
        </div>
    </div>
</div>

<script src="../../bootstrap/js/bootstrap.bundle.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js';"></script>
<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
